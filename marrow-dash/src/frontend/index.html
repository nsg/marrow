<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>marrow-dash</title>
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-base: #0C0C0C;
  --bg-surface: #161616;
  --bg-raised: #1E1E1E;
  --bg-hover: #282828;
  --bg-sidebar: #0A0A0A;
  --border: #2A2A2A;
  --border-focus: #3D3D3D;
  --border-subtle: rgba(255, 255, 255, 0.04);

  --text-primary: #D4CFC4;
  --text-secondary: #8A8478;
  --text-muted: #5A5650;

  --accent: #D4854A;
  --accent-glow: rgba(212, 133, 74, 0.15);
  --accent-dot-bg: rgba(212, 133, 74, 0.04);
  --accent-th-border: rgba(212, 133, 74, 0.3);
  --green: #7DB87D;
  --red: #C75C54;
  --amber: #C9A84C;
  --blue: #6B9FCC;
  --purple: #9B85B5;
  --teal: #6BA89E;

  --font-display: "Anybody", sans-serif;
  --font-body: "DM Sans", sans-serif;
  --font-mono: "JetBrains Mono", monospace;

  --sidebar-width: 56px;
  --content-pad: clamp(16px, 3vw, 32px);
}

[data-theme="light"] {
  --bg-base: #F5F3EF;
  --bg-surface: #FFFFFF;
  --bg-raised: #F0EDE8;
  --bg-hover: #E8E4DD;
  --bg-sidebar: #EAE7E1;
  --border: #D5D0C8;
  --border-focus: #BDB7AD;
  --border-subtle: rgba(0, 0, 0, 0.05);

  --text-primary: #2C2824;
  --text-secondary: #6B6560;
  --text-muted: #9B9590;

  --accent: #C06B2D;
  --accent-glow: rgba(192, 107, 45, 0.12);
  --accent-dot-bg: rgba(192, 107, 45, 0.06);
  --accent-th-border: rgba(192, 107, 45, 0.25);
  --green: #4A8A4A;
  --red: #B54840;
  --amber: #A88830;
  --blue: #4A7FA8;
  --purple: #7A6494;
  --teal: #4A8A80;
}

body {
  font-family: var(--font-body);
  background: var(--bg-base);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
  background-image: radial-gradient(circle, var(--accent-dot-bg) 1px, transparent 1px);
  background-size: 24px 24px;
}

/* Sidebar */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 16px;
  flex-shrink: 0;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  z-index: 100;
}

.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 4px;
  width: 100%;
  padding: 0 8px;
}

.nav-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  background: none;
  border: none;
  border-left: 2px solid transparent;
  color: var(--text-muted);
  cursor: pointer;
  position: relative;
  transition: color 0.2s, border-color 0.2s;
  border-radius: 0;
  padding: 0;
}
.nav-btn svg {
  width: 20px;
  height: 20px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.nav-btn:hover {
  color: var(--text-secondary);
}
.nav-btn.active {
  color: var(--accent);
  border-left-color: var(--accent);
}

/* Tooltip */
.nav-btn .nav-tooltip {
  display: none;
  position: absolute;
  left: calc(100% + 12px);
  top: 50%;
  transform: translateY(-50%);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 4px 10px;
  font-size: 12px;
  font-family: var(--font-body);
  white-space: nowrap;
  z-index: 200;
  pointer-events: none;
}
.nav-btn:hover .nav-tooltip {
  display: block;
}

/* Sidebar footer */
.sidebar-footer {
  margin-top: auto;
  padding-bottom: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.sidebar-brand {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
}
.pulse-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  display: none;
  animation: pulse 2s ease-in-out infinite;
}
.pulse-dot.active {
  display: inline-block;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Main layout */
.main-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  margin-left: var(--sidebar-width);
  min-height: 100vh;
  min-width: 0;
}

/* Top bar */
.top-bar {
  padding: 24px var(--content-pad) 0 var(--content-pad);
  flex-shrink: 0;
}
.top-bar-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.view-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 24px;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}
.top-bar-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}
.auto-refresh-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-secondary);
  user-select: none;
  font-family: var(--font-body);
}
.auto-refresh-toggle input { display: none; }
.toggle-track {
  width: 32px;
  height: 18px;
  background: var(--border);
  border-radius: 9px;
  position: relative;
  transition: background 0.2s;
}
.auto-refresh-toggle input:checked + .toggle-track {
  background: var(--accent);
}
.toggle-track::after {
  content: "";
  position: absolute;
  width: 14px;
  height: 14px;
  background: var(--text-primary);
  border-radius: 50%;
  top: 2px;
  left: 2px;
  transition: transform 0.2s;
}
.auto-refresh-toggle input:checked + .toggle-track::after {
  transform: translateX(14px);
}
.top-bar-divider {
  height: 1px;
  background: linear-gradient(to right, var(--accent), transparent);
  margin-top: 16px;
  opacity: 0.5;
}

/* Main content */
.main {
  flex: 1;
  padding: 24px var(--content-pad);
  overflow-y: auto;
  min-width: 0;
}
.tab-panel {
  display: none;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.tab-panel.active {
  display: block;
  opacity: 1;
}

/* Footer */
.footer {
  border-top: 1px solid var(--border);
  padding: 10px var(--content-pad);
  font-size: 11px;
  color: var(--text-muted);
  text-align: right;
  flex-shrink: 0;
  font-family: var(--font-mono);
}

/* Fade-in animation */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.fade-child {
  animation: fadeUp 0.4s ease forwards;
  opacity: 0;
}
.fade-child:nth-child(1) { animation-delay: 0.05s; }
.fade-child:nth-child(2) { animation-delay: 0.1s; }
.fade-child:nth-child(3) { animation-delay: 0.15s; }
.fade-child:nth-child(4) { animation-delay: 0.2s; }
.fade-child:nth-child(5) { animation-delay: 0.25s; }
.fade-child:nth-child(6) { animation-delay: 0.3s; }
.fade-child:nth-child(7) { animation-delay: 0.35s; }
.fade-child:nth-child(8) { animation-delay: 0.4s; }

/* Stat cards */
.stat-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-left: 2px solid var(--accent);
  padding: 16px 18px;
  transition: border-color 0.2s, background 0.2s;
}
.stat-card:hover {
  background: var(--bg-raised);
}
.stat-card .label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-secondary);
  margin-bottom: 6px;
  font-family: var(--font-body);
  font-weight: 500;
}
.stat-card .value {
  font-size: 24px;
  font-weight: 600;
  font-family: var(--font-mono);
  color: var(--text-primary);
}
.stat-card .value.green { color: var(--green); }
.stat-card .value.blue { color: var(--blue); }
.stat-card .value.amber { color: var(--amber); }
.stat-card .value.teal { color: var(--teal); }
.stat-card .value.purple { color: var(--purple); }

/* Section headers */
.section-title {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  margin-bottom: 14px;
  margin-top: 28px;
}
.section-title:first-child { margin-top: 0; }

/* Activity chart */
.activity-chart {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  padding: 20px;
  margin-bottom: 24px;
}
.chart-bars {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 110px;
  margin-top: 8px;
}
.chart-bar {
  flex: 1;
  min-width: 2px;
  opacity: 0.7;
  transition: opacity 0.15s;
  position: relative;
}
.chart-bar:hover {
  opacity: 1;
}
.chart-bar-segs {
  display: flex;
  flex-direction: column-reverse;
  height: 100%;
  border-radius: 1px 1px 0 0;
  overflow: hidden;
}
.chart-seg { flex: none; }
.chart-seg-task { background: #5EC269; }
.chart-seg-agent { background: #A87FDB; }
.chart-seg-tool { background: #3DC0B0; }
.chart-seg-janitor { background: #E5A832; }
.chart-seg-schedule { background: #4A9EF5; }
.chart-seg-other { background: #777; }
.chart-legend {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 8px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
}
.chart-legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
}
.chart-legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}
.chart-bar-tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  padding: 8px 12px;
  font-size: 11px;
  white-space: nowrap;
  z-index: 10;
  font-family: var(--font-mono);
  pointer-events: none;
  color: var(--text-primary);
  min-width: 120px;
}
.chart-bar-tooltip .tip-header {
  font-weight: 600;
  margin-bottom: 4px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.chart-bar-tooltip .tip-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 1px 0;
}
.chart-bar-tooltip .tip-dot {
  width: 6px;
  height: 6px;
  border-radius: 1px;
  flex-shrink: 0;
}
.chart-bar-tooltip .tip-count {
  margin-left: auto;
  color: var(--text-secondary);
}
.chart-bar:hover .chart-bar-tooltip { display: block; }
.chart-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 10px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

/* Info grid */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.info-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  padding: 18px;
}
.info-card[data-tab] {
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.info-card[data-tab]:hover {
  border-color: var(--border-focus);
  background: var(--bg-hover);
}
.info-card h3 {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}
.info-row {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
  font-size: 13px;
}
.info-row .info-label { color: var(--text-secondary); }
.info-row .info-value { font-family: var(--font-mono); font-size: 13px; }

/* Tables */
.table-wrap {
  overflow-x: auto;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  max-width: 100%;
  container-type: inline-size;
  -webkit-overflow-scrolling: touch;
}
table {
  width: 100%;
  min-width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th {
  text-align: left;
  padding: 10px 14px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-secondary);
  font-weight: 600;
  font-family: var(--font-body);
  border-bottom: 1px solid var(--accent-th-border);
  white-space: nowrap;
}
td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border-subtle);
  vertical-align: top;
}
tr:last-child td { border-bottom: none; }
tr.clickable { cursor: pointer; }
tr.clickable:hover td {
  background: var(--bg-hover);
  border-left: 2px solid var(--accent);
}
tr.clickable:hover td:first-child {
  padding-left: 12px;
}
.mono { font-family: var(--font-mono); font-size: 12px; }
.truncate {
  max-width: 400px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

@container (max-width: 720px) {
  .table-wrap.responsive table,
  .table-wrap.responsive tbody {
    display: block;
    min-width: 0;
    width: 100%;
  }
  .table-wrap.responsive tr:first-child {
    display: none !important;
  }
  .table-wrap.responsive tr:not(.task-detail-row) {
    display: grid;
    gap: 2px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .table-wrap.responsive tr:not(.task-detail-row):last-child {
    border-bottom: none;
  }
  .table-wrap.responsive td {
    display: grid;
    grid-template-columns: minmax(74px, 6rem) minmax(0, 1fr);
    gap: 10px;
    align-items: start;
    justify-items: start;
    padding: 4px 0;
    border-bottom: none;
    min-width: 0;
  }
  .table-wrap.responsive td::before {
    content: attr(data-label);
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .table-wrap.responsive td[data-label="Description"],
  .table-wrap.responsive td[data-label="Fact"],
  .table-wrap.responsive td[data-label="Details"],
  .table-wrap.responsive td[data-label="Model"] {
    grid-template-columns: 1fr;
    gap: 2px;
  }
  .table-wrap.responsive .truncate {
    max-width: none;
    white-space: normal;
  }
  .table-wrap.responsive .mono {
    overflow-wrap: anywhere;
  }
  .table-wrap.responsive .task-detail-row {
    display: block;
    padding: 0;
    border-bottom: 1px solid var(--border-subtle);
  }
  .table-wrap.responsive .task-detail-row td {
    display: block;
    padding: 0;
  }
  .table-wrap.responsive .task-detail-row td::before {
    content: none;
  }
}

/* Badges */
.badge {
  display: inline-block;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 500;
  border-radius: 3px;
  font-family: var(--font-body);
}
.badge-succeeded, .badge-success { background: rgba(125, 184, 125, 0.15); color: var(--green); }
.badge-failed, .badge-failure { background: rgba(199, 92, 84, 0.15); color: var(--red); }
.badge-in-progress, .badge-running { background: rgba(201, 168, 76, 0.15); color: var(--amber); }
.badge-validated { background: rgba(125, 184, 125, 0.15); color: var(--green); }
.badge-unvalidated { background: rgba(90, 86, 80, 0.2); color: var(--text-secondary); }
.badge-auto { background: rgba(107, 159, 204, 0.15); color: var(--blue); }
.badge-user { background: rgba(155, 133, 181, 0.15); color: var(--purple); }
.badge-enabled { background: rgba(125, 184, 125, 0.15); color: var(--green); }
.badge-disabled { background: rgba(90, 86, 80, 0.2); color: var(--text-secondary); }

/* Event type badges */
.badge-task { background: rgba(125, 184, 125, 0.15); color: var(--green); }
.badge-janitor { background: rgba(201, 168, 76, 0.15); color: var(--amber); }
.badge-schedule { background: rgba(107, 159, 204, 0.15); color: var(--blue); }
.badge-agent { background: rgba(155, 133, 181, 0.15); color: var(--purple); }
.badge-transition { background: rgba(212, 133, 74, 0.15); color: var(--accent); }
.badge-tool { background: rgba(107, 168, 158, 0.15); color: var(--teal); }

/* Pagination */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--text-secondary);
  font-family: var(--font-mono);
}
.pagination-btns {
  display: flex;
  gap: 8px;
}
.pg-btn {
  background: none;
  border: none;
  border-bottom: 1px solid transparent;
  color: var(--text-secondary);
  padding: 4px 2px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: color 0.15s, border-color 0.15s;
}
.pg-btn:hover:not(:disabled) {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.pg-btn:disabled { opacity: 0.3; cursor: default; }

/* Tool list */
.tool-list {
  display: flex;
  flex-direction: column;
  gap: 0;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  margin-bottom: 24px;
}
.tool-row {
  border-bottom: 1px solid var(--border);
  border-left: 3px solid var(--teal);
  transition: background 0.15s;
}
.tool-row:last-child { border-bottom: none; }
.tool-row { min-width: 0; }
.tool-row-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  flex-wrap: wrap;
  min-width: 0;
}
.tool-row-header:hover { background: var(--bg-hover); }
.tool-row-name {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--teal);
  flex-shrink: 0;
  overflow-wrap: anywhere;
}
.tool-row-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
  flex: 1 1 18rem;
}
.tool-row-badges {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1 1 auto;
  margin-left: auto;
  min-width: 0;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.provides-tag {
  font-size: 10px;
  padding: 2px 6px;
  background: rgba(107, 159, 204, 0.1);
  color: var(--blue);
  font-family: var(--font-mono);
  border-radius: 2px;
  max-width: 100%;
  overflow-wrap: anywhere;
}
.tool-row-header { cursor: pointer; }
.tool-row.open .skill-row-chevron { transform: rotate(90deg); }
.tool-row.open .tool-row-header { background: var(--bg-hover); }
.tool-expand {
  display: none;
  padding: 0 18px 16px 18px;
  background: var(--bg-raised);
  min-width: 0;
  overflow: hidden;
}
.tool-row.open .tool-expand { display: block; }
.tool-source {
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.7;
  color: var(--text-secondary);
  background: var(--bg-base);
  border: 1px solid var(--border);
  padding: 16px 20px;
  margin-top: 12px;
  overflow: auto;
  max-height: 500px;
  white-space: pre;
  max-width: 100%;
}
.tool-source code { color: var(--text-secondary); }

/* Skills */
.skills-list {
  display: flex;
  flex-direction: column;
  gap: 0;
  background: var(--bg-surface);
  border: 1px solid var(--border);
}
.skill-row {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.skill-row:last-child { border-bottom: none; }
.skill-row-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  padding: 14px 18px;
  cursor: pointer;
  transition: background 0.15s;
  flex-wrap: wrap;
}
.skill-row-header:hover { background: var(--bg-hover); }

.skill-content {

  max-height: 500px;
  overflow-y: auto;
  margin-top: 12px;
}
.md h1, .md h2, .md h3, .md h4 {
  font-family: var(--font-display);
  color: var(--text-primary);
  margin: 16px 0 8px 0;
  font-weight: 600;
}
.md h1 { font-size: 18px; }
.md h2 { font-size: 15px; }
.md h3 { font-size: 13px; }
.md h1:first-child, .md h2:first-child, .md h3:first-child { margin-top: 0; }
.md p { margin: 4px 0; }
.md ul { margin: 6px 0; padding-left: 20px; }
.md li { margin: 3px 0; }
.md code {

  font-size: 12px;
  background: var(--bg-raised);
  padding: 1px 5px;
  border-radius: 2px;

}
.md pre {

  border: 1px solid var(--border);
  padding: 12px 14px;
  margin: 8px 0;
  overflow-x: auto;
}
.md pre code {
  background: none;
  padding: 0;
  font-size: 12px;
  color: var(--text-secondary);
}
.md strong { color: var(--text-primary); }
.md-spacer { height: 6px; }

/* Janitor timeline */
.timeline { padding: 0; list-style: none; position: relative; margin-left: 12px; }
.timeline::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 1px;
  background: var(--accent);
  opacity: 0.4;
}
.timeline-item {
  display: flex;
  gap: 14px;
  padding: 10px 0 10px 20px;
  font-size: 13px;
  position: relative;
}
.timeline-item::before {
  content: "";
  position: absolute;
  left: -3px;
  top: 16px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
}
.timeline-item:last-child { padding-bottom: 0; }
.timeline-time {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  min-width: 140px;
}
.timeline-content { flex: 1; }

/* Search input */
.search-bar {
  margin-bottom: 16px;
}
.search-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text-primary);
  padding: 8px 0;
  font-size: 14px;
  font-family: var(--font-body);
  width: 100%;
  max-width: 400px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-bottom-color: var(--accent); }

/* Filter */
.filter-bar {
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.filter-select {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 6px 10px;
  font-size: 13px;
  font-family: var(--font-body);
  outline: none;
  transition: border-color 0.2s;
}
.filter-select:focus { border-color: var(--accent); }
.filter-label {
  font-size: 12px;
  color: var(--text-secondary);
}

/* Task detail inline expand */
.task-detail-row td {
  padding: 0;
  background: var(--bg-raised);
}
.task-detail-inner {
  padding: 16px 20px;
  max-height: 600px;
  overflow-y: auto;
  margin: 0;
}

/* Workflow tree */
.wf-phase {
  margin-bottom: 2px;
}
.wf-phase:last-child { margin-bottom: 0; }
.wf-phase-hdr {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font-body);
  font-weight: 500;
  color: var(--text-primary);
  user-select: none;
  transition: background 0.15s;
  min-width: 0;
}
.wf-phase-hdr:hover { background: var(--bg-hover); }
.wf-phase-hdr .wf-icon { flex-shrink: 0; width: 16px; text-align: center; }
.wf-phase-hdr .wf-label { flex: 1; min-width: 0; overflow-wrap: anywhere; }
.wf-phase-hdr .wf-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
}
.wf-phase-hdr .wf-chevron {
  color: var(--text-muted);
  font-size: 10px;
  transition: transform 0.2s;
}
.wf-phase.open > .wf-phase-hdr .wf-chevron { transform: rotate(90deg); }
.wf-phase-body {
  display: none;
  padding-left: 20px;
  border-left: 2px solid var(--border);
  margin-left: 19px;
  margin-top: 0;
}
.wf-phase.open > .wf-phase-body { display: block; }

.wf-step {
  margin: 0;
}
.wf-step-hdr {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  font-size: 12px;
  font-family: var(--font-body);
  color: var(--text-secondary);
  cursor: pointer;
  border-radius: 4px;
  transition: background 0.15s;
  user-select: none;
  min-width: 0;
}
.wf-step-hdr:hover { background: var(--bg-hover); }
.wf-step-hdr .wf-icon { flex-shrink: 0; width: 16px; text-align: center; }
.wf-step-hdr .wf-label { flex: 1; min-width: 0; overflow-wrap: anywhere; font-weight: 500; color: var(--text-primary); }
.wf-step-hdr .wf-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
}
.wf-step-hdr .wf-chevron {
  color: var(--text-muted);
  font-size: 10px;
  transition: transform 0.2s;
}
.wf-step.open > .wf-step-hdr .wf-chevron { transform: rotate(90deg); }
.wf-step-body {
  display: none;
  padding-left: 18px;
  border-left: 2px solid var(--border-subtle);
  margin-left: 17px;
}
.wf-step.open > .wf-step-body { display: block; }

.wf-action {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 4px 8px;
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
  border-radius: 3px;
  min-width: 0;
}
.wf-action .wf-icon { flex-shrink: 0; width: 16px; text-align: center; font-style: normal; }
.wf-action .wf-action-name { color: var(--text-primary); min-width: 0; overflow-wrap: anywhere; }
.wf-action .wf-action-detail {
  color: var(--text-muted);
  font-size: 11px;
  margin-left: auto;
  white-space: nowrap;
  flex-shrink: 0;
}
.wf-action.wf-fail .wf-action-name { color: var(--red); }

.wf-parallel-group {
  border-left: 2px solid var(--purple);
  padding-left: 8px;
  margin: 2px 0 2px 6px;
  position: relative;
}
.wf-parallel-label {
  font-size: 10px;
  font-family: var(--font-body);
  color: var(--purple);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 0 0 2px 0;
}

.wf-transition {
  padding: 4px 8px;
  font-size: 11px;
  font-family: var(--font-body);
  color: var(--amber);
  font-style: italic;
}

.wf-done-text {
  padding: 8px 12px;
  font-size: 12px;
  font-family: var(--font-body);
  color: var(--text-secondary);
  border-left: 2px solid var(--green);
  margin: 4px 0 4px 6px;
  word-break: break-word;
  max-height: 200px;
  overflow-y: auto;
  line-height: 1.5;
}
.wf-done-text h1, .wf-done-text h2, .wf-done-text h3,
.wf-done-text h4, .wf-done-text h5, .wf-done-text h6 {
  color: var(--text-primary);
  font-size: 12px;
  font-weight: 600;
  margin: 6px 0 2px;
}
.wf-done-text h2 { font-size: 13px; }
.wf-done-text strong { color: var(--text-primary); }
.wf-done-text ul { margin: 2px 0; padding-left: 18px; }
.wf-done-text li { margin: 1px 0; }
.wf-done-text code {
  background: var(--bg-base);
  padding: 1px 4px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 11px;
}
.wf-done-text pre {
  background: var(--bg-base);
  padding: 6px 8px;
  border-radius: 4px;
  margin: 4px 0;
  overflow-x: auto;
}
.wf-done-text table { border-collapse: collapse; margin: 4px 0; font-size: 11px; }
.wf-done-text th, .wf-done-text td { padding: 2px 8px; border: 1px solid var(--border); }
.wf-done-text th { background: var(--bg-base); color: var(--text-primary); font-weight: 500; }

/* Action detail expand (params / code) */
.wf-action-expand {
  margin: 2px 0 4px 24px;
  padding: 6px 10px;
  background: var(--bg-base);
  border: 1px solid var(--border-subtle);
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 200px;
  overflow-y: auto;
  line-height: 1.5;
}
.wf-action-expand .wf-param-key { color: var(--teal); }
.wf-action-expand .wf-param-val { color: var(--text-primary); }
.wf-action-expand .wf-code-kw { color: var(--purple); }

/* Status icons */
.wf-ok { color: var(--green); }
.wf-err { color: var(--red); }
.wf-info { color: var(--blue); }
.wf-plan { color: var(--purple); }

/* Loading / empty / error states */
.state-msg {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-secondary);
  font-size: 13px;
}
.state-msg.error { color: var(--red); }
.spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Stats bar (memory) */
.stats-bar {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  font-size: 13px;
}
.stats-bar-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.stats-bar-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

/* Schedule cards */
.sched-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.sched-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--green);
  padding: 16px 20px;
  transition: background 0.15s;
}
.sched-card:hover { background: var(--bg-raised); }
.sched-card.sched-disabled { border-left-color: var(--text-muted); opacity: 0.7; }
.sched-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: background 0.15s;
  flex-wrap: wrap;
  min-width: 0;
}
.sched-header:hover { background: var(--bg-hover); margin: -8px -10px 4px -10px; padding: 8px 10px; border-radius: 2px; }
.sched-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 14px;
  color: var(--text-primary);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.sched-card.open .sched-title {
  display: block;
  -webkit-line-clamp: unset;
  overflow: visible;
}
.sched-badges { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
.sched-meta {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 8px 24px;
}
.sched-meta-item { display: flex; flex-direction: column; gap: 2px; }
.sched-meta-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  font-weight: 500;
}
.sched-meta-value {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-secondary);
}
.sched-expand {
  display: none;
  margin-top: 12px;
}
.sched-card.open .sched-expand { display: block; }
.sched-card.open .skill-row-chevron { transform: rotate(90deg); }
.sched-title { flex: 1; min-width: 0; }
.sched-badges { flex-shrink: 0; }

/* Memory clusters */
.mem-cluster {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  margin-bottom: 8px;
}
.mem-cluster-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  transition: background 0.15s;
}
.mem-cluster-header:hover { background: var(--bg-hover); }
.mem-cluster-header .mono { color: var(--text-muted); font-size: 11px; }
.mem-cluster-label { flex: 1; min-width: 0; }
.mem-cluster-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
}
.mem-cluster-body {
  display: none;
  border-top: 1px solid var(--border);
}
.mem-cluster.open .mem-cluster-body { display: block; }
.mem-cluster.open .skill-row-chevron { transform: rotate(90deg); }
.mem-cluster-body table { margin: 0; }
.mem-cluster-body .table-wrap { margin: 0; }

/* Theme toggle */
.theme-toggle { border-left: none !important; }
.theme-icon-sun { display: block; }
.theme-icon-moon { display: none; }
[data-theme="light"] .theme-icon-sun { display: none; }
[data-theme="light"] .theme-icon-moon { display: block; }

/* Responsive: mobile */
@media (max-width: 640px) {
  .sidebar {
    position: fixed;
    top: auto;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 52px;
    flex-direction: row;
    border-right: none;
    border-top: 1px solid var(--border);
    padding: 0;
    z-index: 100;
  }
  .sidebar-nav {
    flex-direction: row;
    justify-content: space-around;
    padding: 0;
    width: 100%;
  }
  .nav-btn {
    border-left: none;
    border-top: 2px solid transparent;
    width: auto;
    height: 52px;
    flex: 1;
  }
  .nav-btn.active {
    border-left-color: transparent;
    border-top-color: var(--accent);
  }
  .nav-btn .nav-tooltip { display: none !important; }
  .sidebar-footer { display: none; }
  .main-wrapper {
    margin-left: 0;
    padding-bottom: calc(52px + env(safe-area-inset-bottom, 0px));
    max-width: 100vw;
    min-width: 0;
  }
  .view-title { font-size: 20px; }
  .stat-row { grid-template-columns: repeat(2, 1fr); }
  .tool-grid { grid-template-columns: 1fr; }
  .info-grid { grid-template-columns: 1fr; }
  table { font-size: 12px; }
  th { padding: 8px 8px; font-size: 9px; }
  td { padding: 7px 8px; }
  .timeline-time { min-width: auto; font-size: 11px; }
  .timeline-item { gap: 8px; }
  .timeline-content { min-width: 0; overflow-wrap: break-word; word-break: break-word; }
}
</style>

    <!-- Schedules -->
    <div class="tab-panel" id="panel-schedules">
      <div id="schedules-content"><div class="state-msg"><span class="spinner"></span> Loading schedules...</div></div>
    </div>

    <!-- Skills -->
    <div class="tab-panel" id="panel-skills">
      <div id="skills-content"><div class="state-msg"><span class="spinner"></span> Loading skills...</div></div>
    </div>

    <!-- Events -->
    <div class="tab-panel" id="panel-events">
      <div class="filter-bar">
        <span class="filter-label">Type:</span>
        <select class="filter-select" id="events-type-filter">
          <option value="">All</option>
          <option value="task">Task</option>
          <option value="janitor">Janitor</option>
          <option value="schedule">Schedule</option>
          <option value="agent">Agent</option>
          <option value="transition">Transition</option>
          <option value="tool">Tool</option>
        </select>
      </div>
      <div id="events-content"><div class="state-msg"><span class="spinner"></span> Loading events...</div></div>
    </div>

    <!-- KV Store -->
    <div class="tab-panel" id="panel-kv">
      <div id="kv-content"><div class="state-msg"><span class="spinner"></span> Loading KV store...</div></div>
    </div>

    <!-- Backend Errors -->
    <div class="tab-panel" id="panel-backend">
      <div class="filter-bar">
        <span class="filter-label">Status:</span>
        <select class="filter-select" id="backend-status-filter">
          <option value="">All</option>
          <option value="0">Network</option>
          <option value="400">400</option>
          <option value="401">401</option>
          <option value="403">403</option>
          <option value="404">404</option>
          <option value="429">429</option>
          <option value="500">500</option>
          <option value="502">502</option>
          <option value="503">503</option>
        </select>
        <span class="filter-label" style="margin-left:12px">Role:</span>
        <select class="filter-select" id="backend-role-filter">
          <option value="">All</option>
        </select>
      </div>
      <div id="backend-content"><div class="state-msg"><span class="spinner"></span> Loading backend errors...</div></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span id="last-refreshed">--</span>
  </div>

</div>

<script>
(function() {
  "use strict";

  // --- View name map ---
  var viewNames = {
    overview: "Overview",
    tasks: "Tasks",
    skills: "Skills",
    tools: "Tools",
    memory: "Memory",
    schedules: "Schedules",
    kv: "KV Store",
    events: "Events",
    backend: "Backend Errors"
  };

  // --- URL helpers ---
  function parseRoute() {
    var parts = location.pathname.replace(/^\//, "").split("/").filter(Boolean);
    var tab = parts[0] || "overview";
    var item = parts.length > 1 ? decodeURIComponent(parts.slice(1).join("/")) : null;
    return { tab: tab, item: item };
  }

  function buildPath(tab, item) {
    var path = tab === "overview" ? "/" : "/" + tab;
    if (item) path += "/" + encodeURIComponent(item);
    return path;
  }

  // --- State ---
  const state = {
    activeTab: "overview",
    pendingItem: null,
    autoRefresh: false,
    refreshTimer: null,
    tasks: { offset: 0, limit: 50, total: 0, expanded: null },
    memory: { offset: 0, limit: 50, total: 0, search: "" },
    events: { offset: 0, limit: 100, total: 0, type: "" },
    backend: { offset: 0, limit: 100, total: 0, status: "", role: "" },
    loaded: {}
  };

  // --- Theme ---
  (function initTheme() {
    var saved = localStorage.getItem("marrow-theme");
    if (saved === "light") document.documentElement.setAttribute("data-theme", "light");
    var btn = document.getElementById("theme-toggle");
    btn.addEventListener("click", function() {
      var isLight = document.documentElement.getAttribute("data-theme") === "light";
      if (isLight) {
        document.documentElement.removeAttribute("data-theme");
        localStorage.setItem("marrow-theme", "dark");
      } else {
        document.documentElement.setAttribute("data-theme", "light");
        localStorage.setItem("marrow-theme", "light");
      }
    });
  })();

  // --- Markdown ---
  function renderMarkdown(src) {
    var e = document.createElement("div");
    e.textContent = "x";
    function esc(s) { e.textContent = s; return e.innerHTML; }
    function inline(s) {
      return s
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>');
    }
    var lines = src.split("\n");
    var out = "";
    var inList = false;
    var inCode = false;
    var codeBuf = "";
    var inTable = false;
    var tableRow = 0;
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (line.startsWith("```")) {
        if (inCode) { out += '<pre><code>' + esc(codeBuf) + '</code></pre>'; codeBuf = ""; }
        inCode = !inCode;
        continue;
      }
      if (inCode) { codeBuf += (codeBuf ? "\n" : "") + line; continue; }
      if (/^#{1,6}\s/.test(line)) {
        if (inList) { out += "</ul>"; inList = false; }
        var lvl = line.match(/^(#+)/)[1].length;
        var text = line.replace(/^#+\s*/, "");
        out += '<h' + lvl + '>' + inline(esc(text)) + '</h' + lvl + '>';
        continue;
      }
      if (/^\s*[-*]\s/.test(line)) {
        if (!inList) { out += "<ul>"; inList = true; }
        out += '<li>' + inline(esc(line.replace(/^\s*[-*]\s+/, ""))) + '</li>';
        continue;
      }
      if (/^\s*\d+\.\s/.test(line)) {
        if (!inList) { out += "<ul>"; inList = true; }
        out += '<li>' + inline(esc(line.replace(/^\s*\d+\.\s+/, ""))) + '</li>';
        continue;
      }
      if (inList) { out += "</ul>"; inList = false; }
      if (/^\|.+\|/.test(line)) {
        if (!inTable) { out += "<table>"; inTable = true; tableRow = 0; }
        if (/^\|\s*[-:]+/.test(line)) { continue; }
        var cells = line.split("|").filter(function(c, idx, arr) { return idx > 0 && idx < arr.length - 1; });
        var tag = tableRow === 0 ? "th" : "td";
        out += "<tr>" + cells.map(function(c) { return "<" + tag + ">" + inline(esc(c.trim())) + "</" + tag + ">"; }).join("") + "</tr>";
        tableRow++;
        continue;
      }
      if (inTable) { out += "</table>"; inTable = false; }
      if (line.trim() === "") { out += '<div class="md-spacer"></div>'; continue; }
      out += '<p>' + inline(esc(line)) + '</p>';
    }
    if (inList) out += "</ul>";
    if (inTable) out += "</table>";
    if (inCode) out += '<pre><code>' + esc(codeBuf) + '</code></pre>';
    return out;
  }

  // --- Helpers ---
  function esc(s) {
    if (s == null) return "";
    const d = document.createElement("div");
    d.textContent = String(s);
    return d.innerHTML;
  }

  function formatTime(ms) {
    if (!ms) return "--";
    const d = new Date(ms);
    return d.toLocaleString(undefined, {
      month: "short", day: "numeric",
      hour: "2-digit", minute: "2-digit", second: "2-digit",
      hour12: false
    });
  }

  function formatTimeShort(ms) {
    if (!ms) return "--";
    const d = new Date(ms);
    return d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit", hour12: false });
  }

  function formatDate(ms) {
    if (!ms) return "--";
    return new Date(ms).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
  }

  function formatDuration(ms) {
    if (ms == null) return "--";
    if (ms < 1000) return ms + "ms";
    const s = Math.round(ms / 1000);
    if (s < 60) return s + "s";
    const m = Math.floor(s / 60);
    return m + "m " + (s % 60) + "s";
  }

  function formatRepeat(raw) {
    if (!raw) return "--";
    var m;
    if ((m = raw.match(/Daily\s*\{\s*hour:\s*(\d+),\s*minute:\s*(\d+)/))) {
      return "Daily at " + String(m[1]).padStart(2, "0") + ":" + String(m[2]).padStart(2, "0");
    }
    if ((m = raw.match(/EveryNHours\s*\{\s*interval:\s*(\d+)/))) {
      return "Every " + m[1] + "h";
    }
    if ((m = raw.match(/Weekly\s*\{\s*day:\s*(\w+),\s*hour:\s*(\d+),\s*minute:\s*(\d+)/))) {
      return m[1] + " at " + String(m[2]).padStart(2, "0") + ":" + String(m[3]).padStart(2, "0");
    }
    if ((m = raw.match(/Once\s*\{\s*at:\s*"?([^}"]+)/))) {
      return "Once at " + m[1];
    }
    return raw;
  }

  function statusBadge(status) {
    if (!status) return "";
    const s = String(status).toLowerCase();
    const cls = s === "succeeded" || s === "success" ? "badge-succeeded"
      : s === "failed" || s === "failure" ? "badge-failed"
      : s === "in-progress" || s === "running" ? "badge-in-progress"
      : "";
    return '<span class="badge ' + cls + '">' + esc(status) + '</span>';
  }

  function eventTypeBadge(type) {
    if (!type) return "";
    const t = String(type).toLowerCase();
    let cls = "";
    if (t === "agent_transition") cls = "badge-transition";
    else if (t.startsWith("task") || t.includes("task")) cls = "badge-task";
    else if (t.startsWith("janitor") || t.includes("janitor")) cls = "badge-janitor";
    else if (t.startsWith("schedule") || t.includes("schedule")) cls = "badge-schedule";
    else if (t.startsWith("agent") || t.includes("agent")) cls = "badge-agent";
    else if (t.startsWith("tool") || t.includes("tool")) cls = "badge-tool";
    return '<span class="badge ' + cls + '">' + esc(type) + '</span>';
  }

  function eventSummary(ev) {
    switch (ev.type) {
      case "task_created": return ev.description || ev.task_id;
      case "task_executed": return (ev.status || "") + (ev.task_id ? " — " + ev.task_id.slice(0, 8) : "");
      case "step_completed": return "step " + ev.step + " " + (ev.action_type || "") + (ev.duration_ms ? " (" + formatDuration(ev.duration_ms) + ")" : "");
      case "agent_action": return (ev.action_type || "") + (ev.detail ? " — " + truncate(ev.detail, 60) : "");
      case "agent_model_response": return "step " + ev.step + " — " + ev.response_len + " chars";
      case "agent_tool_result": return (ev.tool || "") + (ev.success ? " ✓" : " ✗") + " — " + ev.output_len + " chars";
      case "tool_generated": return (ev.name || "") + (ev.description ? " — " + ev.description : "");
      case "tool_selected": return (ev.tools || []).join(", ");
      case "context_assembled": return (ev.providers || []).join(", ");
      case "plan_triage_result": return ev.decision || "";
      case "plan_item_started": return "#" + ev.item_index + " " + (ev.objective || "");
      case "plan_item_completed": return "#" + ev.item_index + (ev.success ? " ✓" : " ✗") + " — " + ev.steps_used + " steps";
      case "janitor_review": return (ev.tool || "") + " attempt " + ev.attempt + (ev.passed ? " passed" : " failed") + (ev.issues ? " — " + ev.issues : "");
      case "janitor_regenerate": return (ev.tool || "") + " attempt " + ev.attempt;
      case "janitor_deleted": return (ev.tool || "") + (ev.reason ? " — " + truncate(ev.reason, 80) : "");
      case "janitor_escalated": return (ev.tool || "") + (ev.reason ? " — " + truncate(ev.reason, 80) : "");
      default: return JSON.stringify(ev).slice(0, 150);
    }
  }

  function truncate(s, max) {
    if (!s) return "";
    return s.length > max ? s.slice(0, max) + "…" : s;
  }

  async function apiFetch(url) {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    return resp.json();
  }

  function setContent(id, html) {
    document.getElementById(id).innerHTML = html;
  }

  function errorMsg(err) {
    return '<div class="state-msg error">Failed to load: ' + esc(err.message) + '</div>';
  }

  function emptyMsg(text) {
    return '<div class="state-msg">' + esc(text) + '</div>';
  }

  function loadingMsg() {
    return '<div class="state-msg"><span class="spinner"></span> Loading...</div>';
  }

  // --- Overview ---
  async function loadOverview() {
    try {
      const data = await apiFetch("/api/overview");
      let html = "";

      // Version
      if (data.version) {
        html += '<div class="fade-child" style="margin-bottom:16px;font-size:13px;color:var(--text-secondary)">marrow <span class="mono" style="color:var(--accent)">' + esc(data.version) + '</span></div>';
      }

      // Stat cards
      html += '<div class="stat-row fade-child">';
      html += statCard("Tasks", data.total_tasks || 0, "blue");
      html += statCard("Steps", data.total_steps || 0, "");
      html += statCard("Tool Calls", data.total_lua_runs || 0, "teal");
      html += statCard("Success Rate", data.success_rate != null ? (data.success_rate * 100).toFixed(1) + "%" : "--", "green");
      html += '</div>';

      // Activity chart
      html += '<div class="section-title fade-child">Activity (48h)</div>';
      html += '<div class="fade-child">' + renderActivityChart(data.activity_buckets || []) + '</div>';

      // Info grid
      html += '<div class="info-grid fade-child">';

      // Memory card
      const mem = data.memory || {};
      html += '<div class="info-card" data-tab="memory"><h3>Memory</h3>';
      html += infoRow("Total", mem.total || 0);
      html += infoRow("Auto", mem.auto_count || 0);
      html += infoRow("User", mem.user_count || 0);
      html += infoRow("Embedded", mem.embedded_count || 0);
      html += '</div>';

      // Toolbox card
      const tb = data.toolbox || {};
      html += '<div class="info-card" data-tab="tools"><h3>Toolbox</h3>';
      html += infoRow("Total", tb.total || 0);
      html += infoRow("Validated", tb.validated || 0);
      html += infoRow("Unvalidated", tb.unvalidated || 0);
      html += '</div>';

      // Schedules card
      const sched = data.schedules || {};
      html += '<div class="info-card" data-tab="schedules"><h3>Schedules</h3>';
      html += infoRow("Total", sched.total || 0);
      html += infoRow("Enabled", sched.enabled || 0);
      html += infoRow("Disabled", sched.disabled || 0);
      html += '</div>';

      // Skills card
      html += '<div class="info-card" data-tab="skills"><h3>Skills</h3>';
      html += infoRow("Loaded", data.skills_count || 0);
      html += '</div>';

      // KV Store card
      html += '<div class="info-card" data-tab="kv"><h3>KV Store</h3>';
      html += infoRow("Entries", data.kv_count || 0);
      html += '</div>';

      // Events card
      html += '<div class="info-card" data-tab="events"><h3>Events</h3>';
      html += infoRow("Total", data.events_count || 0);
      if (data.event_timespan) {
        html += infoRow("First", formatDate(data.event_timespan[0]));
        html += infoRow("Latest", formatDate(data.event_timespan[1]));
      }
      html += '</div>';

      // Backend Errors card
      html += '<div class="info-card" data-tab="backend"><h3>Backend Errors</h3>';
      html += infoRow("Total", data.backend_errors_count || 0);
      html += '</div>';

      html += '</div>';

      // Model config
      const roles = (data.config && data.config.roles) || [];
      if (roles.length > 0) {
        html += '<div class="section-title fade-child">Model Configuration</div>';
        html += '<div class="table-wrap responsive fade-child"><table>';
        html += '<tr><th>Role</th><th>Provider</th><th>Model</th></tr>';
        for (const r of roles) {
          html += '<tr><td data-label="Role">' + esc(r.name) + '</td><td data-label="Provider" class="mono">' + esc(r.provider) + '</td><td data-label="Model" class="mono">' + esc(r.model) + '</td></tr>';
        }
        html += '</table></div>';
      }

      setContent("overview-content", html);
    } catch (e) {
      setContent("overview-content", errorMsg(e));
    }
  }

  function statCard(label, value, colorCls) {
    return '<div class="stat-card"><div class="label">' + esc(label) + '</div><div class="value ' + colorCls + '">' + esc(String(value)) + '</div></div>';
  }

  function infoRow(label, value) {
    return '<div class="info-row"><span class="info-label">' + esc(label) + '</span><span class="info-value">' + esc(String(value)) + '</span></div>';
  }

  var activityCategories = [
    { key: "task", label: "Task", cls: "chart-seg-task", color: "#5EC269" },
    { key: "agent", label: "Agent", cls: "chart-seg-agent", color: "#A87FDB" },
    { key: "tool", label: "Tool", cls: "chart-seg-tool", color: "#3DC0B0" },
    { key: "janitor", label: "Janitor", cls: "chart-seg-janitor", color: "#E5A832" },
    { key: "schedule", label: "Schedule", cls: "chart-seg-schedule", color: "#4A9EF5" },
    { key: "other", label: "Other", cls: "chart-seg-other", color: "#777" }
  ];

  function renderActivityChart(buckets) {
    if (!buckets.length) {
      return '<div class="activity-chart"><div class="state-msg">No activity data</div></div>';
    }
    const max = Math.max(1, ...buckets.map(b => b.count));

    var legend = '<div class="chart-legend">';
    for (var c of activityCategories) {
      legend += '<span class="chart-legend-item"><span class="chart-legend-dot ' + c.cls + '"></span>' + c.label + '</span>';
    }
    legend += '</div>';

    let bars = "";
    for (const b of buckets) {
      const pct = (b.count / max) * 100;
      var segs = "";
      var tipRows = "";
      for (var c of activityCategories) {
        var v = b[c.key] || 0;
        if (v > 0) {
          var segPct = (v / b.count) * 100;
          segs += '<div class="chart-seg ' + c.cls + '" style="height:' + segPct + '%"></div>';
          tipRows += '<div class="tip-row"><span class="tip-dot" style="background:' + c.color + '"></span>' + c.label + '<span class="tip-count">' + v + '</span></div>';
        }
      }
      var tip = '<div class="chart-bar-tooltip"><div class="tip-header">' + esc(formatTimeShort(b.hour_ms)) + ' — ' + b.count + ' events</div>' + tipRows + '</div>';
      bars += '<div class="chart-bar" style="height:' + Math.max(1, pct) + '%">'
        + '<div class="chart-bar-segs">' + segs + '</div>' + tip
        + '</div>';
    }
    const firstLabel = buckets.length > 0 ? formatTimeShort(buckets[0].hour_ms) : "";
    const lastLabel = buckets.length > 0 ? formatTimeShort(buckets[buckets.length - 1].hour_ms) : "";
    return '<div class="activity-chart">'
      + legend
      + '<div class="chart-bars">' + bars + '</div>'
      + '<div class="chart-labels"><span>' + esc(firstLabel) + '</span><span>' + esc(lastLabel) + '</span></div>'
      + '</div>';
  }

  // --- Tasks ---
  async function loadTasks() {
    try {
      const data = await apiFetch("/api/tasks?limit=" + state.tasks.limit + "&offset=" + state.tasks.offset);
      state.tasks.total = data.total || 0;
      const tasks = data.tasks || [];
      if (tasks.length === 0) {
        setContent("tasks-content", emptyMsg("No tasks found."));
        return;
      }
      let html = '<div class="table-wrap responsive"><table id="tasks-table">';
      html += '<tr><th>Time</th><th>Description</th><th>Role</th><th>Status</th><th>Steps</th><th>Duration</th></tr>';
      for (const t of tasks) {
        const rowId = "task-" + t.task_id;
        html += '<tr class="clickable" data-task-id="' + esc(t.task_id) + '">';
        html += '<td data-label="Time" class="mono">' + esc(formatTime(t.timestamp_ms)) + '</td>';
        html += '<td data-label="Description" class="truncate">' + esc(truncate(t.description, 80)) + '</td>';
        html += '<td data-label="Role">' + esc(t.role || "") + '</td>';
        html += '<td data-label="Status">' + statusBadge(t.status) + '</td>';
        html += '<td data-label="Steps" class="mono">' + esc(t.steps != null ? t.steps : "--") + '</td>';
        html += '<td data-label="Duration" class="mono">' + esc(formatDuration(t.total_duration_ms)) + '</td>';
        html += '</tr>';
        html += '<tr class="task-detail-row" id="' + rowId + '" style="display:none"><td colspan="6"><div class="task-detail-inner"><span class="spinner"></span> Loading...</div></td></tr>';
      }
      html += '</table></div>';
      html += renderPagination(state.tasks, "tasks");
      setContent("tasks-content", html);
      bindTaskClicks();
      if (state.pendingItem) {
        var pending = state.pendingItem;
        state.pendingItem = null;
        toggleTaskDetail(pending);
      }
    } catch (e) {
      setContent("tasks-content", errorMsg(e));
    }
  }

  function bindTaskClicks() {
    const rows = document.querySelectorAll("#tasks-table tr.clickable");
    for (const row of rows) {
      row.addEventListener("click", function() {
        const tid = this.getAttribute("data-task-id");
        toggleTaskDetail(tid);
      });
    }
  }

  async function toggleTaskDetail(taskId) {
    const detailRow = document.getElementById("task-" + taskId);
    if (!detailRow) return;
    if (detailRow.style.display !== "none") {
      detailRow.style.display = "none";
      state.tasks.expanded = null;
      updateItemUrl(null);
      return;
    }
    const allDetails = document.querySelectorAll(".task-detail-row");
    for (const d of allDetails) d.style.display = "none";

    detailRow.style.display = "";
    state.tasks.expanded = taskId;
    updateItemUrl(taskId);
    const inner = detailRow.querySelector(".task-detail-inner");
    inner.innerHTML = '<span class="spinner"></span> Loading...';
    try {
      const data = await apiFetch("/api/tasks/" + encodeURIComponent(taskId));
      const events = data.events || [];
      if (events.length === 0) {
        inner.innerHTML = '<div style="color:var(--text-secondary);font-size:12px">No events for this task.</div>';
        return;
      }
      inner.innerHTML = buildWorkflow(events);
      inner.querySelectorAll(".wf-phase-hdr").forEach(function(h) {
        h.addEventListener("click", function() { this.parentElement.classList.toggle("open"); });
      });
      inner.querySelectorAll(".wf-step-hdr").forEach(function(h) {
        h.addEventListener("click", function(e) { e.stopPropagation(); this.parentElement.classList.toggle("open"); });
      });
    } catch (e) {
      inner.innerHTML = '<div class="state-msg error">' + esc(e.message) + '</div>';
    }
  }

  function wfStatusIcon(success) {
    return success ? '<span class="wf-icon wf-ok">✓</span>' : '<span class="wf-icon wf-err">✗</span>';
  }

  function actionIcon(type) {
    if (type === "call_tool") return '<i class="wf-icon" style="color:var(--teal)">⚙</i>';
    if (type === "run_code") return '<i class="wf-icon" style="color:var(--amber)">⚡</i>';
    if (type === "save_tool") return '<i class="wf-icon" style="color:var(--blue)">💾</i>';
    if (type === "remove_tool") return '<i class="wf-icon" style="color:var(--red)">🗑</i>';
    if (type === "load_skill") return '<i class="wf-icon" style="color:var(--purple)">📖</i>';
    if (type === "done") return '<i class="wf-icon wf-ok">✓</i>';
    if (type === "dismiss") return '<i class="wf-icon wf-info">—</i>';
    if (type === "progress") return '<i class="wf-icon" style="color:var(--blue)">💬</i>';
    return '<i class="wf-icon">•</i>';
  }

  function buildWorkflow(events) {
    // Extract plan-level info
    var triage = null, planItems = [], phases = [];
    for (var ev of events) {
      if (ev.type === "plan_triage_result") triage = ev;
      if (ev.type === "plan_item_started") planItems.push(ev);
    }

    // Group events into phases based on plan items
    if (planItems.length > 0) {
      // Planned execution: each plan_item_started..plan_item_completed is a phase
      var phaseIdx = 0;
      var currentPhase = null;
      for (var ev of events) {
        if (ev.type === "plan_item_started") {
          currentPhase = { objective: ev.objective || "Step " + (ev.item_index + 1), events: [], success: null, steps: 0, duration: 0 };
          phases.push(currentPhase);
        } else if (ev.type === "plan_item_completed" && currentPhase) {
          currentPhase.success = ev.success;
          currentPhase.steps = ev.steps_used || 0;
        } else if (currentPhase && (ev.type || "").startsWith("agent") || (ev.type || "").startsWith("step")) {
          if (currentPhase) currentPhase.events.push(ev);
        }
      }
    } else {
      // Direct execution: single phase with all agent events
      var directEvents = events.filter(function(e) {
        return (e.type || "").startsWith("agent") || (e.type || "").startsWith("step");
      });
      if (directEvents.length > 0) {
        phases.push({ objective: "Execution", events: directEvents, success: null, steps: 0, duration: 0 });
      }
    }

    // Compute phase stats from step_completed events
    for (var p of phases) {
      var dur = 0, steps = 0, allOk = true;
      for (var ev of p.events) {
        if (ev.type === "step_completed") {
          steps++;
          dur += ev.duration_ms || 0;
          if (!ev.success) allOk = false;
        }
      }
      if (p.success === null) {
        // Check final action for done/dismiss
        var lastAction = null;
        for (var ev of p.events) { if (ev.type === "agent_action") lastAction = ev; }
        p.success = allOk;
      }
      p.steps = p.steps || steps;
      p.duration = dur;
    }

    // Build HTML
    var html = "";

    // Triage row
    if (triage) {
      var triageIcon = triage.decision === "needs_plan"
        ? '<span class="wf-icon wf-plan">◈</span>'
        : '<span class="wf-icon wf-info">→</span>';
      var triageLabel = triage.decision === "needs_plan" ? "Planned execution" : "Direct execution";
      html += '<div style="display:flex;align-items:center;gap:8px;padding:4px 12px;font-size:12px;color:var(--text-secondary);margin-bottom:4px;">';
      html += triageIcon + ' <span>' + esc(triageLabel) + '</span>';
      html += '</div>';
    }

    // Phases
    for (var pi = 0; pi < phases.length; pi++) {
      var p = phases[pi];
      var phaseSteps = groupSteps(p.events);
      var openClass = phases.length === 1 || pi === phases.length - 1 ? " open" : "";

      html += '<div class="wf-phase' + openClass + '">';
      html += '<div class="wf-phase-hdr">';
      html += wfStatusIcon(p.success);
      html += '<span class="wf-label">' + esc(p.objective) + '</span>';
      html += '<span class="wf-meta">' + esc(p.steps + (p.steps === 1 ? " step" : " steps"));
      if (p.duration) html += ' · ' + esc(formatDuration(p.duration));
      html += '</span>';
      html += '<span class="wf-chevron">▶</span>';
      html += '</div>';
      html += '<div class="wf-phase-body">';

      for (var si = 0; si < phaseSteps.length; si++) {
        var s = phaseSteps[si];
        html += renderStep(s, si === phaseSteps.length - 1);
      }

      html += '</div></div>';
    }

    // Task-level events outside phases (task_created, task_executed)
    if (!html) {
      html = '<div style="color:var(--text-secondary);font-size:12px;padding:8px;">No workflow steps recorded.</div>';
    }

    return html;
  }

  function groupSteps(events) {
    // Group events by step number into step objects
    var steps = [], stepMap = {};
    for (var ev of events) {
      if (ev.type === "agent_action" || ev.type === "agent_tool_result" || ev.type === "step_completed" || ev.type === "agent_transition") {
        var sn = ev.step || 0;
        if (!stepMap[sn]) {
          stepMap[sn] = { step: sn, actions: [], results: [], transitions: [], completed: null };
          steps.push(stepMap[sn]);
        }
        var bucket = stepMap[sn];
        if (ev.type === "agent_action") bucket.actions.push(ev);
        else if (ev.type === "agent_tool_result") bucket.results.push(ev);
        else if (ev.type === "step_completed") bucket.completed = ev;
        else if (ev.type === "agent_transition") bucket.transitions.push(ev);
      }
    }
    return steps;
  }

  function renderStep(s, isLast) {
    var c = s.completed;
    var ok = c ? c.success : true;
    var dur = c ? c.duration_ms : 0;
    var actionType = c ? (c.action_type || "") : "";
    var isParallel = actionType.startsWith("parallel(");
    var stepLabel = "Step " + s.step;
    if (actionType === "done" || actionType === "done_nudge") stepLabel += " — done";
    else if (actionType === "dismiss") stepLabel += " — dismiss";
    else if (isParallel) stepLabel += " — " + esc(actionType);
    var openClass = isLast ? " open" : "";

    var html = '<div class="wf-step' + openClass + '">';
    html += '<div class="wf-step-hdr">';
    html += wfStatusIcon(ok);
    html += '<span class="wf-label">' + stepLabel + '</span>';
    if (dur) html += '<span class="wf-meta">' + esc(formatDuration(dur)) + '</span>';
    html += '<span class="wf-chevron">▶</span>';
    html += '</div>';
    html += '<div class="wf-step-body">';

    // Transitions (system messages)
    for (var t of s.transitions) {
      var msg = t.transition_type || "";
      if (t.detail) msg += " — " + t.detail;
      html += '<div class="wf-transition">⚠ ' + esc(msg) + '</div>';
    }

    // Actions
    if (isParallel && s.actions.length > 1) {
      html += '<div class="wf-parallel-group">';
      html += '<div class="wf-parallel-label">parallel</div>';
      for (var a of s.actions) {
        html += renderAction(a, s.results);
      }
      html += '</div>';
    } else {
      for (var a of s.actions) {
        html += renderAction(a, s.results);
      }
    }

    html += '</div></div>';
    return html;
  }

  function renderAction(a, results) {
    var atype = a.action_type || "";
    var name = a.detail || atype;
    if (atype === "done" || atype === "dismiss") name = atype;
    var icon = actionIcon(atype);

    // Find matching result
    var result = null;
    for (var r of results) {
      if (r.tool === a.detail || (atype === "run_code" && r.tool === a.detail)) {
        result = r;
        break;
      }
    }

    var failClass = (result && !result.success) ? " wf-fail" : "";
    var html = '<div class="wf-action' + failClass + '">';
    html += icon;
    html += '<span class="wf-action-name">' + esc(name) + '</span>';
    if (result) {
      var detail = result.success ? (result.output_len ? result.output_len + " chars" : "ok") : "failed";
      html += '<span class="wf-action-detail">' + esc(detail) + '</span>';
    }
    html += '</div>';

    // Show tool params
    if (atype === "call_tool" && a.params_json) {
      try {
        var params = typeof a.params_json === "string" ? JSON.parse(a.params_json) : a.params_json;
        if (params && Object.keys(params).length > 0) {
          html += '<div class="wf-action-expand">';
          for (var k of Object.keys(params).sort()) {
            var v = params[k];
            var display = (typeof v === "string" && v.length > 120) ? v.slice(0, 120) + "…" : v;
            html += '<span class="wf-param-key">' + esc(k) + '</span>: <span class="wf-param-val">' + esc(display) + '</span>\n';
          }
          html += '</div>';
        }
      } catch(e) {}
    }

    // Show Lua code
    if (atype === "run_code" && a.code) {
      var code = a.code.length > 1000 ? a.code.slice(0, 1000) + "\n…" : a.code;
      html += '<div class="wf-action-expand">' + highlightLua(code) + '</div>';
    }

    // Show done text preview
    if (atype === "done" && a.detail && a.detail.length > 0) {
      var preview = a.detail.length > 500 ? a.detail.slice(0, 500) + "\n…" : a.detail;
      html += '<div class="wf-done-text">' + renderMarkdown(preview) + '</div>';
    }

    return html;
  }

  function highlightLua(code) {
    var lines = code.split("\n");
    var out = "";
    var keywords = ["local","function","end","if","then","else","elseif","for","while","do","return","in","not","and","or","true","false","nil","repeat","until"];
    for (var line of lines) {
      var escaped = esc(line);
      for (var kw of keywords) {
        var re = new RegExp("\\b(" + kw + ")\\b", "g");
        escaped = escaped.replace(re, '<span class="wf-code-kw">$1</span>');
      }
      out += escaped + "\n";
    }
    return out;
  }

        var clusterIds = Object.keys(clusterMap).sort(function(a, b) {

          html += '<div class="mem-cluster-body"><div class="table-wrap responsive"><table>';
          html += '<tr><th>Fact</th><th>Source</th><th>Embedded</th><th>Created</th></tr>';

  // --- Backend Errors ---
  function httpStatusBadge(status) {
    var s = Number(status);
    var cls = s === 0 ? "badge-transition"
      : s >= 500 ? "badge-failed"
      : s === 429 ? "badge-schedule"
      : s >= 400 ? "badge-janitor"
      : "";
    var label = s === 0 ? "network" : String(s);
    return '<span class="badge ' + cls + '">' + esc(label) + '</span>';
  }

  function errorKindBadge(kind) {
    if (!kind) return "";
    var cls = "badge-agent";
    var k = kind.toLowerCase();
    if (k === "timeout") cls = "badge-schedule";
    else if (k.startsWith("connection") || k === "broken_pipe") cls = "badge-failed";
    else if (k === "dns" || k === "tls") cls = "badge-janitor";
    else if (k === "server_error") cls = "badge-failed";
    else if (k === "rate_limit") cls = "badge-schedule";
    else if (k === "client_error") cls = "badge-janitor";
    return '<span class="badge ' + cls + '">' + esc(kind) + '</span>';
  }

  function renderSourceChain(chain) {
    if (!chain || chain.length === 0) return "";
    var html = '<div style="margin-top:4px;font-size:11px;color:var(--text-muted)" class="mono">';
    for (var i = 0; i < chain.length; i++) {
      if (i > 0) html += ' <span style="color:var(--accent)">→</span> ';
      html += esc(chain[i]);
    }
    html += '</div>';
    return html;
  }

  async function loadBackendErrors() {
    try {
      var url = "/api/backend-errors?limit=" + state.backend.limit
        + "&offset=" + state.backend.offset
        + (state.backend.status ? "&status=" + state.backend.status : "")
        + (state.backend.role ? "&role=" + encodeURIComponent(state.backend.role) : "");
      var data = await apiFetch(url);
      state.backend.total = data.total || 0;
      var summary = data.summary || {};
      var errors = data.errors || [];

      var html = "";

      // Stat cards row
      html += '<div class="stat-row fade-child">';
      html += statCard("Total Errors", summary.total_errors || 0, "red");
      var statusCounts = summary.by_status || [];
      var s5xx = 0, s4xx = 0, sNet = 0;
      for (var i = 0; i < statusCounts.length; i++) {
        var st = statusCounts[i].status;
        if (st >= 500) s5xx += statusCounts[i].count;
        else if (st >= 400) s4xx += statusCounts[i].count;
        else if (st === 0) sNet += statusCounts[i].count;
      }
      html += statCard("5xx Errors", s5xx, "red");
      html += statCard("4xx Errors", s4xx, "amber");
      html += statCard("Network", sNet, "purple");
      var roles = summary.by_role || [];
      html += statCard("Roles Affected", roles.length, "blue");
      html += '</div>';

      // Error timeline chart (48h)
      var hourly = summary.hourly || [];
      if (hourly.length > 0) {
        var maxCount = 1;
        for (var i = 0; i < hourly.length; i++) {
          if (hourly[i].count > maxCount) maxCount = hourly[i].count;
        }
        html += '<div class="card fade-child" style="margin-bottom:20px">';
        html += '<div class="card-title">Error Timeline (48h)</div>';
        html += '<div class="activity-chart">';
        for (var i = 0; i < hourly.length; i++) {
          var pct = Math.max(2, Math.round((hourly[i].count / maxCount) * 100));
          var hourLabel = hourly[i].hour.length >= 13 ? hourly[i].hour.slice(11, 13) + ":00" : hourly[i].hour;
          html += '<div class="chart-bar" style="height:' + pct + '%" title="' + esc(hourLabel) + ': ' + hourly[i].count + ' errors"></div>';
        }
        html += '</div></div>';
      }

      // Errors by status code + body (grouped)
      var byBody = summary.by_body || [];
      if (byBody.length > 0) {
        html += '<div class="card fade-child" style="margin-bottom:20px">';
        html += '<div class="card-title">Errors by Response</div>';
        html += '<div class="table-wrap responsive"><table>';
        html += '<tr><th>Status</th><th>Response Body</th><th>Count</th><th>Latest</th></tr>';
        for (var i = 0; i < byBody.length; i++) {
          var g = byBody[i];
          html += '<tr>';
          html += '<td data-label="Status">' + httpStatusBadge(g.status) + '</td>';
          html += '<td data-label="Body" style="word-break:break-all;max-width:500px;font-size:12px" class="mono">' + esc(g.body) + '</td>';
          html += '<td data-label="Count" class="mono">' + g.count + '</td>';
          html += '<td data-label="Latest" class="mono" style="white-space:nowrap">' + esc(g.latest.replace("T", " ").replace("Z", "").slice(0, 19)) + '</td>';
          html += '</tr>';
        }
        html += '</table></div></div>';

        // Populate role filter dropdown dynamically
        var roleSelect = document.getElementById("backend-role-filter");
        if (roleSelect && roles.length > 0) {
          var currentVal = state.backend.role;
          var opts = '<option value="">All</option>';
          for (var i = 0; i < roles.length; i++) {
            var sel = roles[i].role === currentVal ? " selected" : "";
            opts += '<option value="' + esc(roles[i].role) + '"' + sel + '>' + esc(roles[i].role) + ' (' + roles[i].count + ')</option>';
          }
          roleSelect.innerHTML = opts;
        }
      }

      // By role breakdown
      if (roles.length > 0) {
        html += '<div class="card fade-child" style="margin-bottom:20px">';
        html += '<div class="card-title">Errors by Role</div>';
        html += '<div class="table-wrap responsive"><table>';
        html += '<tr><th>Role</th><th>Errors</th></tr>';
        for (var i = 0; i < roles.length; i++) {
          html += '<tr><td data-label="Role">' + esc(roles[i].role) + '</td>';
          html += '<td data-label="Errors" class="mono">' + roles[i].count + '</td></tr>';
        }
        html += '</table></div></div>';
      }

      // Recent errors table
      if (errors.length === 0) {
        html += emptyMsg("No backend errors recorded.");
      } else {
        html += '<div class="card fade-child">';
        html += '<div class="card-title">Recent Errors</div>';
        html += '<div class="table-wrap responsive"><table>';
        html += '<tr><th>Time</th><th>Status</th><th>Kind</th><th>Role</th><th>URL</th><th>Detail</th></tr>';
        for (var i = 0; i < errors.length; i++) {
          var e = errors[i];
          var ts = e.ts.replace("T", " ").replace("Z", "").slice(0, 19);
          var urlShort = e.url.replace(/^https?:\/\//, "").replace(/\/api\/.*/, "/api/…");
          html += '<tr>';
          html += '<td data-label="Time" class="mono" style="white-space:nowrap">' + esc(ts) + '</td>';
          html += '<td data-label="Status">' + httpStatusBadge(e.status) + '</td>';
          html += '<td data-label="Kind">' + errorKindBadge(e.error_kind) + '</td>';
          html += '<td data-label="Role">' + esc(e.role) + '</td>';
          html += '<td data-label="URL" class="mono" style="font-size:12px">' + esc(urlShort) + '</td>';
          html += '<td data-label="Detail" style="word-break:break-all;max-width:400px;font-size:12px">';
          html += '<span class="mono">' + esc(e.body) + '</span>';
          html += renderSourceChain(e.source_chain);
          html += '</td>';
          html += '</tr>';
        }
        html += '</table></div></div>';
        html += renderPagination(state.backend, "backend");
      }

      setContent("backend-content", html);
    } catch (e) {
      setContent("backend-content", errorMsg(e));
    }
  }

  // --- Pagination ---
  function renderPagination(s, section) {
    const total = s.total;
    const offset = s.offset;
    const limit = s.limit;
    const from = total === 0 ? 0 : offset + 1;
    const to = Math.min(offset + limit, total);
    return '<div class="pagination">'
      + '<span>Showing ' + from + '-' + to + ' of ' + total + '</span>'
      + '<div class="pagination-btns">'
      + '<button class="pg-btn" onclick="window.__dash.paginate(\'' + section + '\',-1)"' + (offset === 0 ? " disabled" : "") + '>Prev</button>'
      + '<button class="pg-btn" onclick="window.__dash.paginate(\'' + section + '\',1)"' + (offset + limit >= total ? " disabled" : "") + '>Next</button>'
      + '</div></div>';
  }

  function paginate(section, dir) {
    const s = state[section];
    if (!s) return;
    s.offset = Math.max(0, s.offset + dir * s.limit);
    loadTab(section === "memory" ? "memory" : section);
  }

  // --- Tab management ---
  function switchTab(tab, pushState, item) {
    if (!viewNames[tab]) tab = "overview";
    state.activeTab = tab;
    state.pendingItem = item || null;
    document.querySelectorAll(".nav-btn").forEach(function(btn) {
      btn.classList.toggle("active", btn.getAttribute("data-tab") === tab);
    });
    document.querySelectorAll(".tab-panel").forEach(function(panel) {
      panel.classList.toggle("active", panel.id === "panel-" + tab);
    });
    document.getElementById("view-title").textContent = viewNames[tab] || tab;
    var path = buildPath(tab, item);
    if (pushState !== false) {
      history.pushState({ tab: tab, item: item || null }, "", path);
    }
    loadTab(tab);
  }

  function updateItemUrl(item) {
    var path = buildPath(state.activeTab, item);
    history.replaceState({ tab: state.activeTab, item: item || null }, "", path);
  }

  function bindItemToggle(containerId, rowSelector) {
    var container = document.getElementById(containerId);
    if (!container) return;
    var rows = container.querySelectorAll(rowSelector + "[data-item-name]");
    for (var r of rows) {
      (function(row) {
        var header = row.children[0];
        if (!header) return;
        header.addEventListener("click", function() {
          var wasOpen = row.classList.contains("open");
          row.classList.toggle("open");
          if (wasOpen) {
            updateItemUrl(null);
          } else {
            updateItemUrl(row.getAttribute("data-item-name"));
          }
        });
      })(r);
    }
    if (state.pendingItem) {
      var pending = state.pendingItem;
      state.pendingItem = null;
      for (var r of rows) {
        if (r.getAttribute("data-item-name") === pending) {
          r.classList.add("open");
          r.scrollIntoView({ behavior: "smooth", block: "start" });
          break;
        }
      }
    }
  }

  function loadTab(tab) {
    switch (tab) {
      case "overview": loadOverview(); break;
      case "tasks": loadTasks(); break;
      case "tools": loadTools(); break;
      case "memory": loadMemory(); break;
      case "schedules": loadSchedules(); break;
      case "skills": loadSkills(); break;
      case "kv": loadKv(); break;
      case "events": loadEvents(); break;
      case "backend": loadBackendErrors(); break;
    }
    updateLastRefreshed();
  }

  function updateLastRefreshed() {
    document.getElementById("last-refreshed").textContent =
      "Last refreshed: " + new Date().toLocaleTimeString();
  }

  // --- Auto-refresh ---
  function toggleAutoRefresh(enabled) {
    state.autoRefresh = enabled;
    var dot = document.getElementById("pulse-dot");
    if (dot) dot.classList.toggle("active", enabled);
    if (state.refreshTimer) {
      clearInterval(state.refreshTimer);
      state.refreshTimer = null;
    }
    if (enabled) {
      state.refreshTimer = setInterval(function() {
        loadTab(state.activeTab);
      }, 5000);
    }
  }

  // --- History API: back/forward ---
  window.addEventListener("popstate", function(e) {
    var tab = (e.state && e.state.tab) || "overview";
    var item = (e.state && e.state.item) || null;
    switchTab(tab, false, item);
  });

  // --- Init ---
  function init() {
    // Nav clicks
    document.querySelectorAll(".nav-btn[data-tab]").forEach(function(btn) {
      btn.addEventListener("click", function() {
        switchTab(this.getAttribute("data-tab"));
      });
    });

    // Info card clicks (overview → tab navigation)
    document.getElementById("overview-content").addEventListener("click", function(e) {
      var card = e.target.closest(".info-card[data-tab]");
      if (card) switchTab(card.getAttribute("data-tab"));
    });

    // Auto-refresh toggle
    document.getElementById("auto-refresh-check").addEventListener("change", function() {
      toggleAutoRefresh(this.checked);
    });

    // Memory search
    document.getElementById("memory-search").addEventListener("input", function() {
      const val = this.value;
      clearTimeout(memorySearchTimeout);
      memorySearchTimeout = setTimeout(function() {
        state.memory.search = val;
        state.memory.offset = 0;
        if (state.activeTab === "memory") loadMemory();
      }, 300);
    });

    // Events type filter
    document.getElementById("events-type-filter").addEventListener("change", function() {
      state.events.type = this.value;
      state.events.offset = 0;
      if (state.activeTab === "events") loadEvents();
    });

    // Backend error filters
    document.getElementById("backend-status-filter").addEventListener("change", function() {
      state.backend.status = this.value;
      state.backend.offset = 0;
      if (state.activeTab === "backend") loadBackendErrors();
    });
    document.getElementById("backend-role-filter").addEventListener("change", function() {
      state.backend.role = this.value;
      state.backend.offset = 0;
      if (state.activeTab === "backend") loadBackendErrors();
    });

    // Expose pagination for inline onclick
    window.__dash = { paginate: paginate };

    // Initial load from URL path
    var route = parseRoute();
    switchTab(route.tab, false, route.item);
    history.replaceState({ tab: state.activeTab, item: route.item }, "", location.pathname);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
