# Marrow model routing configuration
# Maps role keys to model providers and models
#
# Required roles: agent, fast
# Required if janitor is enabled: janitor
# Optional: embedding

# Agent role — the main planner that drives the agent loop
# Pick the smartest model available
[roles.agent]
provider = "ollama"
model = "deepseek-v4-flash:cloud"
api_base = "https://ollama.com"
# api_key = "your-key-here"

# Fast role — used for memory retrieval, summarization, and lightweight tasks
# Needs to be fast and reliable for structured tasks
[roles.fast]
provider = "ollama"
model = "deepseek-v4-flash:cloud"
api_base = "https://ollama.com"
# api_key = "your-key-here"

# Janitor role — used for Lua tool review, regeneration, and cleanup
# Needs strong coding ability (SWE-bench, LiveCodeBench)
[roles.janitor]
provider = "ollama"
model = "deepseek-v4-pro:cloud"
api_base = "https://ollama.com"
# api_key = "your-key-here"

# Embedding role — used for vector memory retrieval
# If omitted, Marrow falls back to model-driven memory selection (slower, uses fast role)
[roles.embedding]
provider = "ollama"
model = "nomic-embed-text"
api_base = "https://ollama.com"
# api_key = "your-key-here"

# --- Discord bot ---
# Used by marrow-discord. All discord settings live here.
# [discord]
# token = "your-bot-token"
# channels = []        # channel IDs where the bot responds without @mention
# toolbox = "toolbox"
# memory = "memory"
# log = "events.jsonl"
# verbose = false

# --- Scheduler ---
# Background heartbeat that runs scheduled tasks.
# [scheduler]
# schedules = "schedules"    # path to schedules directory
# enabled = true              # enable/disable the heartbeat loop
# tick_seconds = 60           # how often to check for due schedules (seconds)

