# Marrow model routing configuration
# Maps role keys to model providers and models

# Default role — used for chat and task execution
# Pick the smartest model available
[roles.default]
provider = "ollama"
model = "glm-5:cloud"
api_base = "https://ollama.com"
# api_key = "your-key-here"

# Fast role — used for triage, tool selection, memory retrieval
# Needs to be smart enough for reliable structured JSON, but fast
[roles.fast]
provider = "ollama"
model = "kimi-k2.5:cloud"
api_base = "https://ollama.com"
# api_key = "your-key-here"

# Code role — used for Lua tool generation and janitor reviews
# Needs strong coding ability (SWE-bench, LiveCodeBench)
[roles.code]
provider = "ollama"
model = "glm-5:cloud"
api_base = "https://ollama.com"
# api_key = "your-key-here"

# --- Discord bot ---
# Used by marrow-discord. All discord settings live here.
# [discord]
# token = "your-bot-token"
# toolbox = "toolbox"
# memory = "memory"
# log = "events.jsonl"
# verbose = false

