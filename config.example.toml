# Marrow model routing configuration
# Maps role keys to model providers and models

# Default role — used for chat and task execution
# Pick the smartest model available
[roles.default]
provider = "ollama"
model = "glm-5:cloud"
api_base = "https://ollama.com"
# api_key = "your-key-here"

# Fast role — used for memory retrieval, summarization, and fallbacks
# Needs to be fast and reliable for lightweight structured tasks
[roles.fast]
provider = "ollama"
model = "kimi-k2.5:cloud"
api_base = "https://ollama.com"
# api_key = "your-key-here"

# Code role — used for runtime Lua tool generation and janitor reviews
# Supplements built-in Rust tools. Needs strong coding ability (SWE-bench, LiveCodeBench)
[roles.code]
provider = "ollama"
model = "glm-5:cloud"
api_base = "https://ollama.com"
# api_key = "your-key-here"

# Optional agent role — overrides the planner model used by the agent loop.
# If omitted, Marrow falls back to roles.default, then roles.fast.
# [roles.agent]
# provider = "ollama"
# model = "glm-5:cloud"
# api_base = "https://ollama.com"
# api_key = "your-key-here"

# --- Discord bot ---
# Used by marrow-discord. All discord settings live here.
# [discord]
# token = "your-bot-token"
# channels = []        # channel IDs where the bot responds without @mention
# toolbox = "toolbox"
# memory = "memory"
# log = "events.jsonl"
# verbose = false

# --- Scheduler ---
# Background heartbeat that runs scheduled tasks.
# [scheduler]
# schedules = "schedules"    # path to schedules directory
# enabled = true              # enable/disable the heartbeat loop
# tick_seconds = 60           # how often to check for due schedules (seconds)

# --- Local Ollama (omit api_base to use localhost:11434) ---
# [roles.default]
# provider = "ollama"
# model = "mistral"

