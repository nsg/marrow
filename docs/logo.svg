      <use href="#boneShape" stroke="#D5DADF" stroke-width="6"/>
    </g>
    <g mask="url(#rightHalf)">
      <use href="#boneShape" fill="url(#boneFill)"/>
      <use href="#boneShape" stroke="#D5DADF" stroke-width="6"/>
    </g>
    <path d="M194 145C199 147 205 150 209 156C205 163 200 168 194 176C195 165 195 154 194 145Z" fill="url(#marrowFill)"/>
    <path d="M226 144C221 146 216 151 212 158C216 164 220 169 226 177C225 165 225 154 226 144Z" fill="url(#marrowFill)"/>
    <path d="M194 144L203 149L197 157L205 166L194 177" stroke="#D9DEE2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M226 143L217 150L223 158L215 168L226 178" stroke="#D9DEE2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
