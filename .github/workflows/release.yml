name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-x86_64-unknown-linux-gnu-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-x86_64-unknown-linux-gnu-

      - name: Build release binaries
        run: cargo build --release

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/release/marrow dist/
          cp target/release/marrow-discord dist/
          cd dist
          tar czf marrow-x86_64-unknown-linux-gnu.tar.gz marrow marrow-discord

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: marrow-x86_64-unknown-linux-gnu
          path: dist/marrow-x86_64-unknown-linux-gnu.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --generate-notes \
            artifacts/**/*.tar.gz
