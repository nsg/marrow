# Marrow secrets — credentials and API keys for tools
# Copy to secrets.toml and fill in your values
# NEVER commit secrets.toml to version control
#
# Each secret is a TOML section with a value and description:
#
#   [my_secret_name]
#   value = "the-actual-secret-value"
#   description = "What this secret is for"
#
# Tools receive secrets as regular parameters. The agent passes them using
# the "secret:" prefix (e.g. "secret:github_token") and the value is
# resolved automatically before the tool runs.
#
# In Lua tools, secrets are also available via: secret("name")

# [github_token]
# value = "ghp_..."
# description = "GitHub personal access token"

# [slack_token]
# value = "xoxb-..."
# description = "Slack bot token"

# [openweather_key]
# value = "abc123"
# description = "OpenWeatherMap API key"

# [caldav_username]
# value = "your-username"
# description = "CalDAV server username"

# [caldav_password]
# value = "your-app-password"
# description = "CalDAV server password"

# [caldav_server_url]
# value = "https://your-server.com/remote.php/dav/calendars/user/"
# description = "CalDAV server base URL"
