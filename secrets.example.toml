# Marrow secrets — API keys and tokens for generated tools
# Copy to secrets.toml and fill in your values
# NEVER commit secrets.toml to version control
#
# Tools access these via the secret() host function:
#   local token = secret("github_token")
#   local resp = http_get(url, { Authorization = "Bearer " .. token })

# github_token = "ghp_..."
# slack_token = "xoxb-..."
# openweather_key = "abc123"
